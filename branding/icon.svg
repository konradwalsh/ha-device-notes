  <!-- text lines -->
  <rect x="92" y="120" width="72" height="9" rx="4.5" fill="#2563EB"/>
  <rect x="92" y="142" width="72" height="9" rx="4.5" fill="#93C5FD"/>
  <rect x="92" y="164" width="48" height="9" rx="4.5" fill="#93C5FD"/>

  <!-- small accent dot: a note being added -->
