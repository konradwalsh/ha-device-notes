# Device Notes service surface. Each service accepts EITHER device_id OR any
# entity_id on the target device (entity_id is resolved to its device).

append:
  name: Append note
  description: Append a timestamped line to a device's note log.
  fields:
    device_id:
      name: Device
      description: Target device. Provide this or entity_id.
      required: false
      selector:
        device: {}
    entity_id:
      name: Entity
      description: Any entity on the target device; resolved to its device.
      required: false
      selector:
        entity: {}
    note:
      name: Note
      description: The line to append (trimmed, max 255 characters).
      required: true
      example: Replaced the AA batteries
      selector:
        text: {}
    source:
      name: Source
      description: Who wrote the line. Defaults to "agent" for service calls.
      required: false
      example: agent
      selector:
        text: {}

clear:
  name: Clear notes
  description: Delete the entire note log for a device.
  fields:
    device_id:
      name: Device
      description: Target device. Provide this or entity_id.
      required: false
      selector:
        device: {}
    entity_id:
      name: Entity
      description: Any entity on the target device; resolved to its device.
      required: false
      selector:
        entity: {}

delete_last:
  name: Delete last note
  description: Remove the most recent note entry (undo; the log is append-only).
  fields:
    device_id:
      name: Device
      description: Target device. Provide this or entity_id.
      required: false
      selector:
        device: {}
    entity_id:
      name: Entity
      description: Any entity on the target device; resolved to its device.
      required: false
      selector:
        entity: {}

delete:
  name: Delete a note
  description: Remove a specific note entry by its timestamp.
  fields:
    device_id:
      name: Device
      description: Target device. Provide this or entity_id.
      required: false
      selector:
        device: {}
    entity_id:
      name: Entity
      description: Any entity on the target device; resolved to its device.
      required: false
      selector:
        entity: {}
    ts:
      name: Timestamp
      description: The ts of the entry to remove (copy it from the log).
      required: true
      example: "2026-06-28T22:04:12+01:00"
      selector:
        text: {}
